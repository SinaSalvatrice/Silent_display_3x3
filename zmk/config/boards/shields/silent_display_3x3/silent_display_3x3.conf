# Enable encoder support for the EC11 rotary encoder.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Needed for scroll events on layers using mouse wheel behavior.
CONFIG_ZMK_POINTING=y

# OLED display support.
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y

# Optional underglow support (requires matching hardware node/wiring).
CONFIG_ZMK_RGB_UNDERGLOW=y
