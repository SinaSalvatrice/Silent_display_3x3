name: Build ZMK Firmware

on:
  push:
    paths:
      - "config/**"
      - "build.yaml"
      - ".github/workflows/build.yaml"
  pull_request:
    paths:
      - "config/**"
      - "build.yaml"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      config_path: config
      build_matrix_path: build.yaml
